<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Notes">
<meta name="theme-color" content="#2f6f4f">
<link rel="manifest" href="./manifest.json">
<link rel="icon" href="./icon-192.png">
<link rel="apple-touch-icon" href="./icon-192.png">
<title>Notes & Reminders</title>
<style>
  :root{
    --bg:#f6f7f5;
    --card:#ffffff;
    --ink:#1e2320;
    --muted:#6b756f;
    --accent:#2f6f4f;
    --accent-soft:#e6f0ea;
    --border:#e2e5e2;
    --danger:#b3492f;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    padding-bottom:60px;
  }
  #app{max-width:640px;margin:0 auto;padding:16px;}
  header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;padding-top:8px;flex-wrap:wrap;gap:8px;}
  header h1{font-size:20px;margin:0;font-weight:700;}
  .header-actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end;}
  .icon-btn{
    background:var(--card);border:1px solid var(--border);color:var(--ink);
    padding:8px 12px;border-radius:10px;font-size:12.5px;font-weight:600;cursor:pointer;
    max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  }
  .icon-btn:active{background:var(--accent-soft);}

  form.add-form{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
  form.add-form input[type=text]{
    flex:1 1 100%;
    padding:12px 14px;border:1px solid var(--border);border-radius:10px;
    font-size:15px;background:var(--card);color:var(--ink);
  }
  form.add-form select{
    flex:1;padding:10px;border:1px solid var(--border);border-radius:10px;
    font-size:14px;background:var(--card);color:var(--ink);
  }
  form.add-form button{
    background:var(--accent);color:#fff;border:none;padding:10px 16px;
    border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;
  }

  .toolbar{margin-bottom:14px;}

  .category{
    background:var(--card);border:1px solid var(--border);border-radius:12px;
    margin-bottom:10px;overflow:hidden;
  }
  .category.depth-1, .category.depth-2, .category.depth-3{margin-left:16px;margin-top:8px;}
  .cat-header{
    display:flex;align-items:center;gap:6px;padding:12px 12px;cursor:pointer;
  }
  .cat-toggle{
    background:none;border:none;font-size:14px;color:var(--muted);cursor:pointer;
    width:20px;flex:none;
  }
  .cat-name{flex:1;font-weight:600;font-size:15px;}
  .cat-count{
    font-size:11px;color:var(--muted);background:var(--accent-soft);
    padding:2px 8px;border-radius:20px;margin-right:4px;
  }
  .cat-actions{display:flex;gap:4px;}
  .mini-btn{
    background:none;border:none;font-size:15px;padding:4px 6px;cursor:pointer;color:var(--muted);
  }
  .mini-btn:active{color:var(--accent);}
  .cat-body{padding:0 12px 12px 12px;}
  .cat-children{margin-top:4px;}

  ul.item-list{list-style:none;margin:0;padding:0;}
  ul.item-list li{
    display:flex;align-items:flex-start;gap:10px;padding:9px 4px;border-bottom:1px solid var(--border);
  }
  ul.item-list li:last-child{border-bottom:none;}
  .chk{
    width:22px;height:22px;flex:none;margin-top:2px;accent-color:var(--accent);cursor:pointer;
  }
  .item-main{flex:1;min-width:0;}
  .item-text{font-size:14.5px;word-break:break-word;}
  .item-meta{font-size:11px;color:var(--muted);margin-top:2px;}
  .item-del{background:none;border:none;color:var(--muted);font-size:16px;cursor:pointer;padding:2px 6px;}
  .item-del:active{color:var(--danger);}
  .completed .item-text{text-decoration:line-through;color:var(--muted);}

  .completed-toggle{
    margin-top:8px;background:var(--accent-soft);border:none;color:var(--accent);
    font-size:12.5px;font-weight:600;padding:7px 10px;border-radius:8px;cursor:pointer;width:100%;text-align:left;
  }
  .completed-body{margin-top:6px;}

  .empty-hint{font-size:12.5px;color:var(--muted);padding:6px 4px;font-style:italic;}

  .banner{
    background:#fff6e9;border:1px solid #f0d9a8;border-radius:12px;
    padding:10px 12px;margin-bottom:14px;
  }
  .banner-title{font-size:12.5px;font-weight:700;color:#8a5b12;text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px;}
  .banner-row{display:flex;justify-content:space-between;gap:10px;padding:5px 0;font-size:13.5px;border-top:1px solid #f0d9a8;}
  .banner-row:first-of-type{border-top:none;}
  .banner-row .b-what{color:var(--ink);}
  .banner-row .b-cat{color:var(--muted);font-size:12px;}
  .banner-row .b-due{white-space:nowrap;font-weight:600;font-size:12.5px;}
  .b-due.due-overdue{color:var(--danger);}
  .b-due.due-soon{color:#8a5b12;}

  .item-note{font-size:12.5px;color:var(--muted);margin-top:2px;font-style:italic;}
  .item-deadline{font-size:11.5px;font-weight:600;margin-top:2px;display:inline-block;}
  .item-deadline.due-overdue{color:var(--danger);}
  .item-deadline.due-soon{color:#8a5b12;}
  .item-deadline.due-later{color:var(--muted);font-weight:normal;}

  .section-header{display:flex;align-items:center;justify-content:space-between;margin:26px 0 4px;}
  .section-header h2{font-size:13px;margin:0;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;}
  .section-sub{font-size:12.5px;color:var(--muted);margin-bottom:12px;}

  .checklist{border-left:4px solid var(--accent);}
  ul.item-list li.checked{background:var(--accent-soft);border-radius:8px;padding-left:6px;}
  ul.item-list li.checked .item-text{color:var(--accent);}

  /* Modal */
  .modal-overlay{
    position:fixed;inset:0;background:rgba(20,25,22,0.45);display:none;
    align-items:flex-end;justify-content:center;z-index:100;
  }
  .modal-overlay.open{display:flex;}
  .modal-box{
    background:var(--card);width:100%;max-width:480px;border-radius:16px 16px 0 0;
    padding:18px;animation:slideup .15s ease-out;
  }
  @media (min-width:520px){
    .modal-overlay{align-items:center;}
    .modal-box{border-radius:16px;}
  }
  @keyframes slideup{from{transform:translateY(30px);opacity:0;}to{transform:translateY(0);opacity:1;}}
  .modal-title{font-size:16px;font-weight:700;margin-bottom:12px;}
  .modal-body input[type=text], .modal-body select{
    width:100%;padding:12px 14px;border:1px solid var(--border);border-radius:10px;
    font-size:15px;margin-bottom:10px;background:var(--bg);color:var(--ink);
  }
  .modal-msg{font-size:14px;color:var(--ink);margin-bottom:14px;line-height:1.4;}
  .modal-footer{display:flex;gap:8px;justify-content:flex-end;}
  .modal-footer button{
    padding:10px 16px;border-radius:10px;font-size:14px;font-weight:600;border:none;cursor:pointer;
  }
  .btn-cancel{background:var(--bg);color:var(--ink);border:1px solid var(--border) !important;}
  .btn-confirm{background:var(--accent);color:#fff;}
  .btn-danger{background:var(--danger);color:#fff;}

  .drive-row{display:flex;flex-direction:column;gap:8px;margin-bottom:4px;}
  .drive-btn{width:100%;padding:12px;border-radius:10px;border:none;font-weight:600;font-size:14px;cursor:pointer;}
  .drive-btn.primary{background:var(--accent);color:#fff;}
  .drive-btn.secondary{background:var(--bg);border:1px solid var(--border) !important;color:var(--ink);}
  .drive-btn:disabled{opacity:.55;cursor:default;}
  .drive-status{font-size:12.5px;color:var(--muted);margin:2px 0 12px;line-height:1.5;}
  .drive-link{color:var(--accent);text-decoration:underline;cursor:pointer;background:none;border:none;font-size:12.5px;padding:0;}

  .toast{
    position:fixed;bottom:18px;left:50%;transform:translateX(-50%);
    background:#1e2320;color:#fff;padding:10px 16px;border-radius:10px;font-size:13px;
    opacity:0;pointer-events:none;transition:opacity .2s;z-index:200;
  }
  .toast.show{opacity:1;}
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>Notes &amp; Reminders</h1>
    <div class="header-actions">
      <button class="icon-btn" id="folderBtn" title="Auto-save to a local folder">🔗 Connect folder</button>
      <button class="icon-btn" id="driveBtn" title="Backup to Google Drive">☁️ Drive Backup</button>
      <button class="icon-btn" id="exportBtn">Export</button>
      <button class="icon-btn" id="importBtn">Import</button>
      <input type="file" id="importInput" accept="application/json" hidden>
    </div>
  </header>

  <div id="deadlineBanner"></div>

  <form class="add-form" id="addForm">
    <input type="text" id="itemText" placeholder="New reminder or note…" required>
    <select id="itemCategory"></select>
    <button type="submit">Add</button>
  </form>
  <button type="button" class="drive-link" id="toggleDetailsBtn" style="margin:-6px 0 12px;">+ Add note / deadline</button>
  <div class="add-form" id="detailsRow" style="display:none;">
    <input type="text" id="itemNote" placeholder="Optional note">
    <input type="date" id="itemDeadline" style="flex:1;padding:12px 14px;border:1px solid var(--border);border-radius:10px;font-size:14px;background:var(--card);color:var(--ink);">
  </div>

  <div class="toolbar">
    <button class="icon-btn" id="addCategoryBtn">+ New Category</button>
  </div>

  <div id="categoryTree"></div>

  <div class="section-header">
    <h2>Checklists</h2>
    <button class="icon-btn" id="addChecklistBtn">+ New Checklist</button>
  </div>
  <div class="section-sub">For packing lists, document submissions, etc. — items stay checked or unchecked in place, nothing moves away.</div>

  <div id="checklistTree"></div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal-box">
    <div class="modal-title" id="modalTitle"></div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer" id="modalFooter"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function(){
  "use strict";

  var STORAGE_KEY = "notesRemindersData_v1";

  function uid(prefix){
    return prefix + "_" + Date.now().toString(36) + "_" + Math.random().toString(36).slice(2,8);
  }

  function defaultData(){
    var names = ["Personal","Work","Job applications","Health"];
    var cats = names.map(function(n){ return {id: uid("cat"), name: n, parentId: null}; });
    return {categories: cats, items: [], checklists: [], checklistItems: [], collapsed: {}};
  }

  function loadData(){
    var raw = localStorage.getItem(STORAGE_KEY);
    if(raw){
      try{
        var parsed = JSON.parse(raw);
        if(parsed && Array.isArray(parsed.categories) && Array.isArray(parsed.items)){
          if(!parsed.collapsed) parsed.collapsed = {};
          if(!Array.isArray(parsed.checklists)) parsed.checklists = [];
          if(!Array.isArray(parsed.checklistItems)) parsed.checklistItems = [];
          return parsed;
        }
      }catch(e){ console.error("Failed to parse saved data", e); }
    }
    return defaultData();
  }

  var data = loadData();
  var saveDirHandle = null;
  var autoSaveEnabled = false;

  function persistLocal(){
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  }

  function dataChanged(){
    persistLocal();
    if(autoSaveEnabled) writeAutoSaveFile();
  }

  // kept for any older call sites; treat as a full data change
  function saveData(){ dataChanged(); }

  function getChildren(parentId){
    return data.categories.filter(function(c){ return c.parentId === parentId; });
  }

  function getDescendantCatIds(catId){
    var ids = [catId];
    getChildren(catId).forEach(function(c){
      ids = ids.concat(getDescendantCatIds(c.id));
    });
    return ids;
  }

  function getItemsFor(catId, completed){
    return data.items.filter(function(it){ return it.categoryId === catId && it.completed === completed; });
  }

  function formatDate(iso){
    if(!iso) return "";
    var d = new Date(iso);
    var datePart = d.toLocaleDateString(undefined, {year:"numeric", month:"short", day:"numeric"});
    var timePart = d.toLocaleTimeString(undefined, {hour:"2-digit", minute:"2-digit"});
    return datePart + " " + timePart;
  }

  function showToast(msg){
    var t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    clearTimeout(t._timer);
    t._timer = setTimeout(function(){ t.classList.remove("show"); }, 1800);
  }

  // ---------- Modal ----------
  var modalOverlay = document.getElementById("modalOverlay");
  var modalTitle = document.getElementById("modalTitle");
  var modalBody = document.getElementById("modalBody");
  var modalFooter = document.getElementById("modalFooter");

  function closeModal(){
    modalOverlay.classList.remove("open");
    modalBody.innerHTML = "";
    modalFooter.innerHTML = "";
  }

  function openFormModal(opts){
    // opts: {title, fields:[{id,label,type:'text'|'select',options,placeholder,value}], confirmLabel, onConfirm(values), danger}
    modalTitle.textContent = opts.title;
    modalBody.innerHTML = "";
    var inputs = {};
    (opts.fields || []).forEach(function(f){
      if(f.label){
        var lbl = document.createElement("div");
        lbl.style.fontSize = "12.5px";
        lbl.style.color = "var(--muted)";
        lbl.style.marginBottom = "4px";
        lbl.textContent = f.label;
        modalBody.appendChild(lbl);
      }
      var el;
      if(f.type === "select"){
        el = document.createElement("select");
        (f.options || []).forEach(function(o){
          var opt = document.createElement("option");
          opt.value = o.value;
          opt.textContent = o.text;
          el.appendChild(opt);
        });
      } else if(f.type === "date"){
        el = document.createElement("input");
        el.type = "date";
      } else {
        el = document.createElement("input");
        el.type = "text";
        el.placeholder = f.placeholder || "";
        if(f.value) el.value = f.value;
      }
      el.id = "modal_field_" + f.id;
      modalBody.appendChild(el);
      inputs[f.id] = el;
    });

    modalFooter.innerHTML = "";
    var cancelBtn = document.createElement("button");
    cancelBtn.className = "btn-cancel";
    cancelBtn.textContent = "Cancel";
    cancelBtn.onclick = closeModal;
    var confirmBtn = document.createElement("button");
    confirmBtn.className = opts.danger ? "btn-danger" : "btn-confirm";
    confirmBtn.textContent = opts.confirmLabel || "Save";
    confirmBtn.onclick = function(){
      var values = {};
      Object.keys(inputs).forEach(function(k){ values[k] = inputs[k].value; });
      opts.onConfirm(values);
    };
    modalFooter.appendChild(cancelBtn);
    modalFooter.appendChild(confirmBtn);
    modalOverlay.classList.add("open");
    var firstInput = modalBody.querySelector("input,select");
    if(firstInput) setTimeout(function(){ firstInput.focus(); }, 50);
  }

  function openConfirmModal(opts){
    // opts: {title, message, confirmLabel, danger, onConfirm}
    modalTitle.textContent = opts.title;
    modalBody.innerHTML = "";
    var msg = document.createElement("div");
    msg.className = "modal-msg";
    msg.textContent = opts.message;
    modalBody.appendChild(msg);

    modalFooter.innerHTML = "";
    var cancelBtn = document.createElement("button");
    cancelBtn.className = "btn-cancel";
    cancelBtn.textContent = "Cancel";
    cancelBtn.onclick = closeModal;
    var confirmBtn = document.createElement("button");
    confirmBtn.className = opts.danger ? "btn-danger" : "btn-confirm";
    confirmBtn.textContent = opts.confirmLabel || "OK";
    confirmBtn.onclick = function(){ opts.onConfirm(); };
    modalFooter.appendChild(cancelBtn);
    modalFooter.appendChild(confirmBtn);
    modalOverlay.classList.add("open");
  }

  modalOverlay.addEventListener("click", function(e){
    if(e.target === modalOverlay) closeModal();
  });

  // ---------- Category select options (flat w/ indent) ----------
  function fillCategorySelect(selectEl, excludeIds){
    excludeIds = excludeIds || [];
    selectEl.innerHTML = "";
    function walk(parentId, depth){
      getChildren(parentId).forEach(function(c){
        if(excludeIds.indexOf(c.id) !== -1) return;
        var opt = document.createElement("option");
        opt.value = c.id;
        var prefix = depth > 0 ? " ".repeat(depth) + "↳ " : "";
        opt.textContent = prefix + c.name;
        selectEl.appendChild(opt);
        walk(c.id, depth + 1);
      });
    }
    walk(null, 0);
  }

  // ---------- Actions ----------
  function addItem(text, categoryId, note, deadline){
    text = (text || "").trim();
    if(!text || !categoryId) return;
    data.items.push({
      id: uid("item"),
      text: text,
      note: (note || "").trim(),
      deadline: deadline || null,
      categoryId: categoryId,
      createdAt: new Date().toISOString(),
      completed: false,
      completedAt: null
    });
    dataChanged();
    render();
  }

  function daysUntilDeadline(deadline){
    if(!deadline) return null;
    var today = new Date();
    today.setHours(0, 0, 0, 0);
    var d = new Date(deadline + "T00:00:00");
    return Math.round((d - today) / 86400000);
  }

  function deadlineLabel(diff){
    if(diff < 0) return "Overdue by " + Math.abs(diff) + " day" + (Math.abs(diff) === 1 ? "" : "s");
    if(diff === 0) return "Due today";
    if(diff === 1) return "Due tomorrow";
    return "Due in " + diff + " days";
  }

  function deadlineUrgencyClass(diff){
    if(diff < 0) return "due-overdue";
    if(diff <= 5) return "due-soon";
    return "due-later";
  }

  function toggleComplete(itemId, completed){
    var it = data.items.find(function(i){ return i.id === itemId; });
    if(!it) return;
    it.completed = completed;
    it.completedAt = completed ? new Date().toISOString() : null;
    dataChanged();
    render();
  }

  function deleteItem(itemId){
    data.items = data.items.filter(function(i){ return i.id !== itemId; });
    dataChanged();
    render();
  }

  function addCategory(name, parentId){
    name = (name || "").trim();
    if(!name) return;
    data.categories.push({id: uid("cat"), name: name, parentId: parentId || null});
    dataChanged();
    render();
  }

  function renameCategory(catId, newName){
    newName = (newName || "").trim();
    if(!newName) return;
    var c = data.categories.find(function(c){ return c.id === catId; });
    if(c){ c.name = newName; dataChanged(); render(); }
  }

  function deleteCategory(catId){
    var idsToDelete = getDescendantCatIds(catId);
    data.categories = data.categories.filter(function(c){ return idsToDelete.indexOf(c.id) === -1; });
    data.items = data.items.filter(function(i){ return idsToDelete.indexOf(i.categoryId) === -1; });
    dataChanged();
    render();
  }

  function toggleCollapsed(key){
    data.collapsed[key] = !data.collapsed[key];
    persistLocal();
    render();
  }

  // ---------- Checklists (items stay in place, checked or not — no completed list) ----------
  function addChecklist(name){
    name = (name || "").trim();
    if(!name) return;
    data.checklists.push({id: uid("chk"), name: name});
    dataChanged();
    render();
  }

  function renameChecklist(checklistId, newName){
    newName = (newName || "").trim();
    if(!newName) return;
    var c = data.checklists.find(function(c){ return c.id === checklistId; });
    if(c){ c.name = newName; dataChanged(); render(); }
  }

  function deleteChecklist(checklistId){
    data.checklists = data.checklists.filter(function(c){ return c.id !== checklistId; });
    data.checklistItems = data.checklistItems.filter(function(i){ return i.checklistId !== checklistId; });
    dataChanged();
    render();
  }

  function resetChecklist(checklistId){
    data.checklistItems.forEach(function(i){
      if(i.checklistId === checklistId) i.checked = false;
    });
    dataChanged();
    render();
  }

  function addChecklistItem(checklistId, text){
    text = (text || "").trim();
    if(!text || !checklistId) return;
    data.checklistItems.push({id: uid("citem"), checklistId: checklistId, text: text, checked: false});
    dataChanged();
    render();
  }

  function toggleChecklistItem(itemId, checked){
    var it = data.checklistItems.find(function(i){ return i.id === itemId; });
    if(!it) return;
    it.checked = checked;
    dataChanged();
    render();
  }

  function deleteChecklistItem(itemId){
    data.checklistItems = data.checklistItems.filter(function(i){ return i.id !== itemId; });
    dataChanged();
    render();
  }

  // ---------- Rendering ----------
  function renderItemLi(item, isCompleted){
    var li = document.createElement("li");
    if(isCompleted) li.className = "completed";

    var chk = document.createElement("input");
    chk.type = "checkbox";
    chk.className = "chk";
    chk.checked = !!item.completed;
    chk.addEventListener("change", function(){
      toggleComplete(item.id, chk.checked);
    });

    var main = document.createElement("div");
    main.className = "item-main";
    var txt = document.createElement("div");
    txt.className = "item-text";
    txt.textContent = item.text;
    main.appendChild(txt);

    if(item.note){
      var noteEl = document.createElement("div");
      noteEl.className = "item-note";
      noteEl.textContent = item.note;
      main.appendChild(noteEl);
    }

    if(item.deadline && !isCompleted){
      var diff = daysUntilDeadline(item.deadline);
      var dl = document.createElement("div");
      dl.className = "item-deadline " + deadlineUrgencyClass(diff);
      dl.textContent = "📅 " + deadlineLabel(diff) + " (" + item.deadline + ")";
      main.appendChild(dl);
    } else if(item.deadline && isCompleted){
      var dl2 = document.createElement("div");
      dl2.className = "item-deadline due-later";
      dl2.textContent = "📅 Was due " + item.deadline;
      main.appendChild(dl2);
    }

    var meta = document.createElement("div");
    meta.className = "item-meta";
    if(isCompleted){
      meta.textContent = "Created " + formatDate(item.createdAt) + " · Completed " + formatDate(item.completedAt);
    } else {
      meta.textContent = "Created " + formatDate(item.createdAt);
    }
    main.appendChild(meta);

    var del = document.createElement("button");
    del.className = "item-del";
    del.textContent = "×";
    del.title = "Delete";
    del.addEventListener("click", function(){
      openConfirmModal({

  // ---------- Local folder auto-save (JSON + CSV) ----------
  var IDB_NAME = "notesRemindersHandles";
  var IDB_STORE = "handles";

  function idbOpen(){
    return new Promise(function(resolve, reject){
      var req = indexedDB.open(IDB_NAME, 1);
      req.onupgradeneeded = function(){ req.result.createObjectStore(IDB_STORE); };
      req.onsuccess = function(){ resolve(req.result); };
      req.onerror = function(){ reject(req.error); };
    });
  }
  function idbSet(key, value){
    return idbOpen().then(function(db){
      return new Promise(function(resolve, reject){
        var tx = db.transaction(IDB_STORE, "readwrite");
        tx.objectStore(IDB_STORE).put(value, key);
        tx.oncomplete = function(){ resolve(); };
        tx.onerror = function(){ reject(tx.error); };
      });
    });
  }
  function idbGet(key){
    return idbOpen().then(function(db){
      return new Promise(function(resolve, reject){
        var tx = db.transaction(IDB_STORE, "readonly");
        var req = tx.objectStore(IDB_STORE).get(key);
        req.onsuccess = function(){ resolve(req.result); };
        req.onerror = function(){ reject(req.error); };
      });
    });
  }

  function csvEscape(val){
    val = val === null || val === undefined ? "" : String(val);
    if(/[",\n]/.test(val)){
      val = '"' + val.replace(/"/g, '""') + '"';
    }
    return val;
  }

  function getCategoryPath(catId){
    var parts = [];
    var cur = data.categories.find(function(c){ return c.id === catId; });
    while(cur){
      parts.unshift(cur.name);
      cur = cur.parentId ? data.categories.find(function(c){ return c.id === cur.parentId; }) : null;
    }
    return parts.join(" > ");
  }

  function buildCSV(){
    var rows = [["Section", "Category / Checklist", "Item", "Note", "Deadline", "Status", "Created At", "Completed At"]];
    data.items.forEach(function(it){
      rows.push([
        "Reminder",
        getCategoryPath(it.categoryId),
        it.text,
        it.note || "",
        it.deadline || "",
        it.completed ? "Completed" : "Active",
        formatDate(it.createdAt),
        it.completed ? formatDate(it.completedAt) : ""
      ]);
    });
    data.checklistItems.forEach(function(it){
      var cl = data.checklists.find(function(c){ return c.id === it.checklistId; });
      rows.push([
        "Checklist",
        cl ? cl.name : "",
        it.text,
        "",
        "",
        it.checked ? "Checked" : "Unchecked",
        "",
        ""
      ]);
    });
    return rows.map(function(r){ return r.map(csvEscape).join(","); }).join("\r\n");
  }

  function updateAutoSaveStatus(){
    var btn = document.getElementById("folderBtn");
    if(!btn) return;
    if(!("showDirectoryPicker" in window)){
      btn.style.display = "none";
      return;
    }
    if(!saveDirHandle){
      btn.textContent = "🔗 Connect folder";
      btn.title = "Auto-save your data as JSON + CSV to a folder on this device";
      return;
    }
    saveDirHandle.queryPermission({mode: "readwrite"}).then(function(perm){
      if(perm === "granted"){
        autoSaveEnabled = true;
        btn.textContent = "✅ " + saveDirHandle.name;
        btn.title = "Auto-saving here. Click to disconnect.";
      } else {
        autoSaveEnabled = false;
        btn.textContent = "🔗 Reconnect folder";
        btn.title = "Click to restore auto-save permission for \"" + saveDirHandle.name + "\"";
      }
    }).catch(function(){});
  }

  function writeAutoSaveFile(){
    if(!saveDirHandle) return Promise.resolve();
    return saveDirHandle.queryPermission({mode: "readwrite"}).then(function(perm){
      if(perm !== "granted") return;
      var payload = buildExportPayload();
      return saveDirHandle.getFileHandle("notes-reminders-data.json", {create: true})
        .then(function(fh){ return fh.createWritable(); })
        .then(function(w){ return w.write(JSON.stringify(payload, null, 2)).then(function(){ return w.close(); }); })
        .then(function(){
          return saveDirHandle.getFileHandle("notes-reminders-data.csv", {create: true});
        })
        .then(function(fh){ return fh.createWritable(); })
        .then(function(w){ return w.write(buildCSV()).then(function(){ return w.close(); }); });
    }).catch(function(err){
      console.error("Auto-save failed", err);
      showToast("Auto-save failed — check folder access");
    });
  }

  function connectNewFolder(){
    if(!("showDirectoryPicker" in window)){
      showToast("This browser doesn't support folder auto-save. Use Export instead.");
      return;
    }
    window.showDirectoryPicker({mode: "readwrite"}).then(function(handle){
      saveDirHandle = handle;
      autoSaveEnabled = true;
      return idbSet("saveDir", handle).then(function(){ return writeAutoSaveFile(); });
    }).then(function(){
      if(saveDirHandle){
        updateAutoSaveStatus();
        showToast('Connected to "' + saveDirHandle.name + '" — auto-saving JSON + CSV here');
      }
    }).catch(function(err){
      if(err && err.name !== "AbortError") showToast("Could not connect folder");
    });
  }

  function handleFolderButtonClick(){
    if(saveDirHandle){
      saveDirHandle.queryPermission({mode: "readwrite"}).then(function(perm){
        if(perm === "granted"){
          openConfirmModal({
            title: "Disconnect folder?",
            message: 'Stop auto-saving to "' + saveDirHandle.name + '"? Your existing files stay put — you can reconnect anytime, or export/import manually.',
            confirmLabel: "Disconnect",
            danger: true,
            onConfirm: function(){
              saveDirHandle = null;
              autoSaveEnabled = false;
              idbSet("saveDir", null);
              updateAutoSaveStatus();
              closeModal();
              showToast("Disconnected");
            }
          });
        } else {
          saveDirHandle.requestPermission({mode: "readwrite"}).then(function(newPerm){
            if(newPerm === "granted"){
              autoSaveEnabled = true;
              updateAutoSaveStatus();
              writeAutoSaveFile();
              showToast('Reconnected — auto-saving to "' + saveDirHandle.name + '"');
            } else {
              showToast("Permission denied");
            }
          }).catch(function(){ connectNewFolder(); });
        }
      });
    } else {
      connectNewFolder();
    }
  }

  function tryRestoreFolder(){
    idbGet("saveDir").then(function(handle){
      if(handle){
        saveDirHandle = handle;
      }
      updateAutoSaveStatus();
    }).catch(function(){ updateAutoSaveStatus(); });
  }

  var driveBusy = false;
  var driveShowIdInput = false;

  function driveGetClientId(){ return localStorage.getItem("driveClientId") || DRIVE_CLIENT_ID_DEFAULT; }
  function driveGetFileId(){ return localStorage.getItem("driveFileId") || ""; }
  function driveGetLastBackupAt(){ return localStorage.getItem("driveLastBackupAt") || ""; }

  function loadGisScript(){
    if(window.google && window.google.accounts && window.google.accounts.oauth2){
      return Promise.resolve();
    }
    if(!navigator.onLine){
      return Promise.reject(new Error("You're offline — Drive backup needs an internet connection."));
    }
    return new Promise(function(resolve, reject){
      var existing = document.querySelector('script[data-gis="1"]');
      if(existing){
        existing.addEventListener("load", function(){ resolve(); });
        existing.addEventListener("error", function(){ reject(new Error("Couldn't load Google's sign-in script. Check your connection.")); });
        return;
      }
      var s = document.createElement("script");
      s.src = GIS_SRC;
      s.async = true;
      s.dataset.gis = "1";
      s.onload = function(){ resolve(); };
      s.onerror = function(){ reject(new Error("Couldn't load Google's sign-in script. Check your connection.")); };
      document.head.appendChild(s);
    });
  }

  function driveSignIn(clientId){
    return loadGisScript().then(function(){
      return new Promise(function(resolve, reject){
        if(!driveTokenClient){
          driveTokenClient = google.accounts.oauth2.initTokenClient({
            client_id: clientId,
            scope: DRIVE_SCOPE,
            callback: function(){}
          });
        }
        driveTokenClient.callback = function(resp){
          if(resp && resp.error){
            reject(new Error(resp.error_description || resp.error));
            return;
          }
          driveAccessToken = resp.access_token;
          driveTokenExpiresAt = Date.now() + (Number(resp.expires_in || 3600) * 1000);
          resolve(driveAccessToken);
        };
        try{
          driveTokenClient.requestAccessToken({hint: ""});
        }catch(err){
          reject(err);
        }
      });
    });
  }

  function driveGetValidToken(){
    var clientId = driveGetClientId();
    if(!clientId) return Promise.reject(new Error("Add your Google OAuth Client ID first."));
    if(driveAccessToken && driveTokenExpiresAt - 30000 > Date.now()){
      return Promise.resolve(driveAccessToken);
    }
    return driveSignIn(clientId);
  }

  function driveApiFetch(url, options){
    return driveGetValidToken().then(function(token){
      options = options || {};
      options.headers = Object.assign({}, options.headers, {Authorization: "Bearer " + token});
      return fetch(url, options).then(function(res){
        if(res.status === 401){
          driveAccessToken = null;
          throw new Error("Google sign-in expired. Try again.");
        }
        return res;
      });
    });
  }

  function driveFindExistingFileId(){
    var q = encodeURIComponent("name = '" + DRIVE_FILE_NAME + "' and trashed = false");
    var url = "https://www.googleapis.com/drive/v3/files?q=" + q + "&fields=files(id,name)&spaces=drive";
    return driveApiFetch(url).then(function(res){ return res.json(); }).then(function(json){
      if(json.files && json.files.length){
        return json.files[0].id;
      }
      return null;
    });
  }

  function driveCreateFile(){
    return driveApiFetch("https://www.googleapis.com/drive/v3/files", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({name: DRIVE_FILE_NAME, mimeType: "application/json"})
    }).then(function(res){ return res.json(); }).then(function(json){ return json.id; });
  }

  function driveEnsureFileId(){
    var existing = driveGetFileId();
    if(existing) return Promise.resolve(existing);
    return driveFindExistingFileId().then(function(id){
      if(id){
        localStorage.setItem("driveFileId", id);
        return id;
      }
      return driveCreateFile().then(function(newId){
        localStorage.setItem("driveFileId", newId);
        return newId;
      });
    });
  }

  function driveBackupNow(){
    return driveEnsureFileId().then(function(fileId){
      var content = JSON.stringify(buildExportPayload(), null, 2);
      return driveApiFetch("https://www.googleapis.com/upload/drive/v3/files/" + fileId + "?uploadType=media", {
        method: "PATCH",
        headers: {"Content-Type": "application/json"},
        body: content
      });
    }).then(function(){
      localStorage.setItem("driveLastBackupAt", new Date().toISOString());
    });
  }

  function driveRestoreLatest(){
    var fileId = driveGetFileId();
    if(!fileId){
      return Promise.reject(new Error("No Drive backup found yet — run \"Backup now\" at least once first."));
    }
    return driveApiFetch("https://www.googleapis.com/drive/v3/files/" + fileId + "?alt=media")
      .then(function(res){ return res.json(); });
  }

  // ---- Drive modal UI ----
  function renderDrivePanel(){
    modalTitle.textContent = "Google Drive Backup";
    modalBody.innerHTML = "";
    modalFooter.innerHTML = "";

    var clientId = driveGetClientId();

    if(driveShowIdInput){
      var info = document.createElement("div");
      info.className = "drive-status";
      info.textContent = "Paste a different Google OAuth Client ID to use instead of the built-in one (see the README for how to create one).";
      modalBody.appendChild(info);

      var input = document.createElement("input");
      input.type = "text";
      input.placeholder = "xxxxx.apps.googleusercontent.com";
      input.value = localStorage.getItem("driveClientId") || "";
      modalBody.appendChild(input);

      var row = document.createElement("div");
      row.className = "drive-row";
      var saveBtn = document.createElement("button");
      saveBtn.className = "drive-btn primary";
      saveBtn.textContent = "Save Client ID";
      saveBtn.addEventListener("click", function(){
        var v = input.value.trim();
        if(!v){ showToast("Enter a Client ID first"); return; }
        localStorage.setItem("driveClientId", v);
        localStorage.removeItem("driveFileId");
        driveAccessToken = null;
        driveTokenClient = null;
        driveShowIdInput = false;
        renderDrivePanel();
      });
      row.appendChild(saveBtn);

      if(localStorage.getItem("driveClientId")){
        var resetBtn = document.createElement("button");
        resetBtn.className = "drive-btn secondary";
        resetBtn.textContent = "Use built-in Client ID instead";
        resetBtn.addEventListener("click", function(){
          localStorage.removeItem("driveClientId");
          localStorage.removeItem("driveFileId");
          driveAccessToken = null;
          driveTokenClient = null;
          driveShowIdInput = false;
          renderDrivePanel();
        });
        row.appendChild(resetBtn);
      }
      modalBody.appendChild(row);
    } else {
      var idLine = document.createElement("div");
      idLine.className = "drive-status";
      var shortId = clientId.length > 18 ? clientId.slice(0, 10) + "…" + clientId.slice(-8) : clientId;
      idLine.textContent = "Client ID: " + shortId + " ";
      var changeBtn = document.createElement("button");
      changeBtn.className = "drive-link";
      changeBtn.textContent = "Change";
      changeBtn.addEventListener("click", function(){
        driveShowIdInput = true;
        renderDrivePanel();
      });
      idLine.appendChild(changeBtn);
      modalBody.appendChild(idLine);

      var signedIn = !!driveAccessToken && driveTokenExpiresAt > Date.now();
      var statusLine = document.createElement("div");
      statusLine.className = "drive-status";
      var lastBackup = driveGetLastBackupAt();
      statusLine.textContent = (signedIn ? "Signed in ✓" : "Not signed in yet") +
        (lastBackup ? " · Last backup: " + formatDate(lastBackup) : " · No backup yet");
      modalBody.appendChild(statusLine);

      var row = document.createElement("div");
      row.className = "drive-row";

      if(!signedIn){
        var signInBtn = document.createElement("button");
        signInBtn.className = "drive-btn primary";
        signInBtn.textContent = "Sign in with Google";
        signInBtn.addEventListener("click", function(){
          signInBtn.disabled = true;
          signInBtn.textContent = "Opening Google sign-in…";
          driveSignIn(clientId).then(function(){
            showToast("Signed in");
            renderDrivePanel();
          }).catch(function(err){
            showToast(err.message || "Sign-in failed");
            renderDrivePanel();
          });
        });
        row.appendChild(signInBtn);
      } else {
        var backupBtn = document.createElement("button");
        backupBtn.className = "drive-btn primary";
        backupBtn.textContent = "Backup now";
        backupBtn.disabled = driveBusy;
        backupBtn.addEventListener("click", function(){
          driveBusy = true;
          backupBtn.disabled = true;
          backupBtn.textContent = "Backing up…";
          driveBackupNow().then(function(){
            driveBusy = false;
            showToast("Backed up to Drive");
            renderDrivePanel();
          }).catch(function(err){
            driveBusy = false;
            showToast(err.message || "Backup failed");
            renderDrivePanel();
          });
        });
        row.appendChild(backupBtn);

        var restoreBtn = document.createElement("button");
        restoreBtn.className = "drive-btn secondary";
        restoreBtn.textContent = "Restore latest backup";
        restoreBtn.addEventListener("click", function(){
          restoreBtn.disabled = true;
          restoreBtn.textContent = "Fetching…";
          driveRestoreLatest().then(function(parsed){
            restoreBtn.disabled = false;
            restoreBtn.textContent = "Restore latest backup";
            if(!parsed || !Array.isArray(parsed.categories) || !Array.isArray(parsed.items)){
              showToast("Backup file looks invalid");
              return;
            }
            openConfirmModal({
              title: "Restore from Drive?",
              message: "This will replace everything currently on this device (" + data.categories.length + " categories, " + data.items.length + " reminders, " + (data.checklists||[]).length + " checklists) with the Drive backup (" + parsed.categories.length + " categories, " + parsed.items.length + " reminders). This cannot be undone.",
              confirmLabel: "Replace",
              danger: true,
              onConfirm: function(){
                data = {
                  categories: parsed.categories,
                  items: parsed.items,
                  checklists: Array.isArray(parsed.checklists) ? parsed.checklists : [],
                  checklistItems: Array.isArray(parsed.checklistItems) ? parsed.checklistItems : [],
                  collapsed: {}
                };
                persistLocal();
                render();
                showToast("Restored from Drive");
                closeModal();
              }
            });
          }).catch(function(err){
            restoreBtn.disabled = false;
            restoreBtn.textContent = "Restore latest backup";
            showToast(err.message || "Restore failed");
          });
        });
        row.appendChild(restoreBtn);

        var signOutBtn = document.createElement("button");
        signOutBtn.className = "drive-btn secondary";
        signOutBtn.textContent = "Sign out";
        signOutBtn.addEventListener("click", function(){
          driveAccessToken = null;
          renderDrivePanel();
        });
        row.appendChild(signOutBtn);
      }

      modalBody.appendChild(row);
    }

    var closeBtn = document.createElement("button");
    closeBtn.className = "btn-cancel";
    closeBtn.textContent = "Close";
    closeBtn.onclick = closeModal;
    modalFooter.appendChild(closeBtn);

    modalOverlay.classList.add("open");
  }

  var driveBtnEl = document.getElementById("driveBtn");
  if(driveBtnEl) driveBtnEl.addEventListener("click", function(){
    driveShowIdInput = false;
    renderDrivePanel();
  });

  // ---------- Offline support (service worker) ----------
  if("serviceWorker" in navigator){
    window.addEventListener("load", function(){
      navigator.serviceWorker.register("./sw.js").catch(function(err){
        // Fails silently on file:// or unsupported hosting — app still works online.
        console.warn("Service worker registration failed:", err);
      });
    });
  }

  // init
  render();
  updateAutoSaveStatus();
  tryRestoreFolder();
})();
</script>
</body>
</html>
